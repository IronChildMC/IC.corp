<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mi Agenda Interactiva</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #1e1e1e;
    color: #f0f0f0;
    margin: 0;
    padding: 0;
  }
  header {
    background: #3b82f6;
    padding: 20px;
    text-align: center;
    font-size: 1,5em;
    font-weight: bold;
  }
  #controls {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin: 20px;
  }
  input[type="text"] {
    padding: 5px;
    border-radius: 5px;
    border: none;
    width: 200px;
  }
  button {
    padding: 5px 10px;
    border: none;
    border-radius: 5px;
    background: #3b82f6;
    color: #fff;
    cursor: pointer;
  }
  main {
    display: flex;
    flex-wrap: wrap;
    padding: 20px;
    gap: 20px;
  }
  section {
    background: #2a2a2a;
    padding: 15px;
    border-radius: 10px;
    flex: 1 1 300px;
    min-width: 250px;
    position: relative;
  }
  h2 {
    border-bottom: 2px solid #3b82f6;
    padding-bottom: 5px;
    margin: 0;
  }
  textarea {
    width: 100%;
    height: 100px;
    margin-top: 10px;
    border-radius: 5px;
    border: none;
    padding: 10px;
    resize: vertical;
    background: #1e1e1e;
    color: #f0f0f0;
  }
  .deleteBtn {
    position: absolute;
    top: 10px;
    right: 10px;
    background: #ef4444;
  }
</style>
</head>
<body>
<header>Mi Agenda Interactiva</header>

<div id="controls">
  <input type="text" id="newSectionName" placeholder="Nombre de nueva sección">
  <button onclick="addSection()">Añadir sección</button>
</div>

<main id="agendaContainer">
  <!-- Secciones predeterminadas -->
</main>

<script>
const container = document.getElementById('agendaContainer');

// Cargar secciones guardadas
let sections = JSON.parse(localStorage.getItem('sections')) || [
  {id: 'juegos', name: 'Juegos', content: ''},
  {id: 'programacion', name: 'Programación', content: ''},
  {id: 'logros', name: 'Logros', content: ''},
  {id: 'aleatorio', name: 'Cosas Aleatorias', content: ''}
];

function saveSections() {
  localStorage.setItem('sections', JSON.stringify(sections));
}

// Crear sección en el DOM
function createSection(section) {
  const sec = document.createElement('section');
  sec.id = section.id;

  const title = document.createElement('h2');
  title.textContent = section.name;
  sec.appendChild(title);

  const textarea = document.createElement('textarea');
  textarea.value = section.content;
  sec.appendChild(textarea);

  const saveBtn = document.createElement('button');
  saveBtn.textContent = 'Guardar';
  saveBtn.onclick = () => {
    section.content = textarea.value;
    saveSections();
    alert('Guardado!');
  };
  sec.appendChild(saveBtn);

  const deleteBtn = document.createElement('button');
  deleteBtn.textContent = 'Eliminar';
  deleteBtn.className = 'deleteBtn';
  deleteBtn.onclick = () => {
    if(confirm(`¿Seguro que quieres eliminar "${section.name}"?`)) {
      sections = sections.filter(s => s.id !== section.id);
      saveSections();
      renderSections();
    }
  };
  sec.appendChild(deleteBtn);

  container.appendChild(sec);
}

// Renderizar todas las secciones
function renderSections() {
  container.innerHTML = '';
  sections.forEach(createSection);
}

// Añadir nueva sección
function addSection() {
  const nameInput = document.getElementById('newSectionName');
  const name = nameInput.value.trim();
  if(!name) return alert('Escribe un nombre válido');
  const id = 'sec_' + Date.now();
  const newSec = {id, name, content: ''};
  sections.push(newSec);
  saveSections();
  renderSections();
  nameInput.value = '';
}

// Inicializar
renderSections();
</script>
</body>
</html>
