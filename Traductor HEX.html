<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Traductor Hex ↔ Texto</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<style>
  body {
    font-family: 'Courier New', monospace;
    background: #121212;
    color: #c0c0c0;
    padding: 30px;
  }
  h2 {
    text-align: center;
    margin-bottom: 20px;
    font-weight: normal;
    color: #ffffff;
    font-family: 'Orbitron', sans-serif;
  }
  textarea {
    width: 100%;
    height: 120px;
    margin: 10px 0;
    font-family: monospace;
    background: #1e1e1e;
    color: #c0c0c0;
    border: 1px solid #555;
    border-radius: 8px;
    padding: 10px;
    transition: all 0.3s ease;
  }
  textarea span.highlight {
    background-color: #555;
    color: #fff;
    font-weight: bold;
  }
  textarea:focus {
    border-color: #888;
    box-shadow: 0 0 5px rgba(200,200,200,0.3);
    outline: none;
  }
  button {
    padding: 8px 18px;
    margin: 5px;
    cursor: pointer;
    background: #00ffff;
    color: #111;
    border: none;
    border-radius: 5px;
    transition: all 0.2s ease;
  }
  button:hover { background: #00cccc; }
  pre {
    background: #1e1e1e;
    border: 1px solid #555;
    border-radius: 8px;
    padding: 15px;
    margin-top: 20px;
    font-family: monospace;
    color: #c0c0c0;
    white-space: pre-wrap;
  }
  .highlight {
    display: inline-block;
    margin: 2px 4px;
    padding: 2px 4px;
    border-radius: 4px;
    transition: all 0.3s;
    cursor: pointer;
  }
  .highlight.active { background-color: #888; color: #fff; font-weight: bold; }
  .highlight.clicked { background-color: #ffa500; color: #111; font-weight: bold; }
</style>
</head>
<body>

<h2>Traductor Hex ↔ Texto</h2>

<textarea id="input" placeholder="Escribe texto o hexadecimal aquí..."></textarea>
<div style="text-align:center;">
  <button onclick="copiar()">Copiar resultado</button>
  <button onclick="toggleAlfabeto()">Mostrar/ocultar alfabeto completo</button>
</div>

<textarea id="output" readonly></textarea>
<pre id="alfabeto" style="display:none;"></pre>

<script>
// Alfabeto completo
const alfabeto = [];
const chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789`~!@#$%^&*()-_=+[{]}\\|;:'\",<.>/? ";
for(let i=0;i<chars.length;i++){
  const c = chars[i];
  const hex = c.charCodeAt(0).toString(16).padStart(2,'0');
  alfabeto.push({char:c,hex:hex});
}
alfabeto.push({char:'ENTER',hex:'0a'});

// Elementos
const input = document.getElementById('input');
const output = document.getElementById('output');
const pre = document.getElementById('alfabeto');

function toHex(text){
  let hex='';
  for(let i=0;i<text.length;i++){
    if(text[i]==='\n') hex+='0a ';
    else hex += text.charCodeAt(i).toString(16).padStart(2,'0')+' ';
  }
  return hex.trim();
}

function fromHex(hex){
  const arr=hex.trim().split(/[\s,]+/);
  let text='';
  arr.forEach(h=>{ text += (h==='0a'?'\n':String.fromCharCode(parseInt(h,16))); });
  return text;
}

function updateOutput(){
  const val = input.value;
  output.value = /^[0-9a-fA-F\s,]+$/.test(val)&&val.trim()!=='' ? fromHex(val) : toHex(val);
  highlightInput(val);
}

// Traducción en tiempo real
input.addEventListener('input', updateOutput);

// Copiar resultado
function copiar(){
  output.select();
  navigator.clipboard.writeText(output.value).then(()=>alert('¡Copiado al portapapeles!'));
}

// Mostrar/ocultar alfabeto
function toggleAlfabeto(){
  if(pre.style.display==='none') pre.style.display='block';
  else pre.style.display='none';
  renderAlfabeto();
  updateOutput();
}

// Renderizar alfabeto
function renderAlfabeto(){
  let html='';
  alfabeto.forEach(e=>{
    html+=`<span class="highlight" data-hex="${e.hex}" data-char="${e.char}">${e.char===' '?'SPACE':e.char} = ${e.hex}</span> `;
  });
  pre.innerHTML=html;
}

// Resaltado dinámico
function highlightInput(val){
  if(pre.style.display==='none') return;
  const spans = pre.querySelectorAll('.highlight');
  spans.forEach(sp=>sp.classList.remove('active','clicked'));

  val.split('').forEach(ch=>{
    const hex = (ch==='\n')?'0a':ch.charCodeAt(0).toString(16).padStart(2,'0');
    spans.forEach(sp=>{
      if(sp.dataset.hex.toLowerCase()===hex.toLowerCase() || sp.dataset.char===ch) sp.classList.add('active');
    });
  });

  const hexMatches = val.match(/\b[0-9a-fA-F]{2}\b/g);
  if(hexMatches){
    hexMatches.forEach(h=>{
      spans.forEach(sp=>{
        if(sp.dataset.hex.toLowerCase()===h.toLowerCase()) sp.classList.add('active');
      });
    });
  }

  // Resaltar en textarea de salida
  output.innerHTML = '';
  for(let ch of output.value){
    const span = document.createElement('span');
    const hex = (ch==='\n')?'0a':ch.charCodeAt(0).toString(16).padStart(2,'0');
    span.textContent = ch;
    spans.forEach(spa=>{
      if(spa.dataset.hex.toLowerCase()===hex.toLowerCase() || spa.dataset.char===ch){
        span.classList.add('active');
      }
    });
    output.appendChild(span);
  }
}

// Click izquierdo en HEX para resaltar
pre.addEventListener('click', e=>{
  const span = e.target.closest('span.highlight');
  if(!span) return;
  pre.querySelectorAll('.highlight.clicked').forEach(s=>s.classList.remove('clicked'));
  span.classList.add('clicked');

  const hexVal = span.dataset.hex;
  const charVal = span.dataset.char;
  pre.querySelectorAll('.highlight').forEach(sp=>{
    if(sp.dataset.hex.toLowerCase()===hexVal.toLowerCase() || sp.dataset.char===charVal){
      sp.classList.add('clicked');
    }
  });

  output.innerHTML = '';
  for(let ch of output.value){
    const s = document.createElement('span');
    s.textContent = ch;
    const hex = (ch==='\n')?'0a':ch.charCodeAt(0).toString(16).padStart(2,'0');
    if(hex.toLowerCase()===hexVal.toLowerCase() || ch===charVal) s.classList.add('clicked');
    output.appendChild(s);
  }
});
</script>

</body>
</html>
