<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Flappy Bird</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=ADLaM+Display&display=swap" rel="stylesheet">
<style>
body{margin:0;text-align:center;font-family:'ADLaM Display',cursive;background:linear-gradient(to bottom, #87ceeb, #f4f4f4)}
canvas{display:block;margin:30px auto;border:3px solid #333;border-radius:6px;background:#87ceeb;position:relative}
button{padding:10px 20px;font-size:18px;border:none;border-radius:6px;background:#ffd93d;cursor:pointer;font-family:'ADLaM Display'}
button:hover{transform:scale(1.05)}
#musicBtn{position:fixed;bottom:10px;right:10px;font-size:14px}
#score{position:absolute;top:10px;left:10px;font-size:28px;color:#fff;font-weight:bold;text-shadow:2px 2px #000;z-index:10}
#gameOverScreen{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;font-size:32px;font-weight:bold;display:none;z-index:20}
#gameOverScreen button{margin-top:20px}
</style>
</head>
<body>
<h1>Flappy Bird</h1>
<div style="position:relative; display:inline-block;">
<canvas id="game" width="700" height="500"></canvas>
<div id="score">0</div>
<div id="gameOverScreen">
  <div id="finalScore"></div>
  <button id="restartBtn">Reiniciar</button>
</div>
</div>
<button id="musicBtn">Musica</button>
<audio id="bgMusic" loop></audio>
<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const musicBtn=document.getElementById('musicBtn');
const bgMusic=document.getElementById('bgMusic');
const scoreDisplay=document.getElementById('score');
const gameOverScreen=document.getElementById('gameOverScreen');
const finalScore=document.getElementById('finalScore');
const restartBtn=document.getElementById('restartBtn');

let bird={x:120,y:250,vy:0,radius:15};
let pipes=[];
let frame=0;
let score=0;
let highScore=parseInt(localStorage.getItem('flappyHighScore'))||0;
let loop=null;
let gameOver=false;

// ====== INPUT ======
document.addEventListener('keydown',e=>{if(['w',' ','arrowup'].includes(e.key.toLowerCase())) jump();});
document.addEventListener('click',jump);
function jump(){if(!gameOver) bird.vy=-8;}

// ====== MUSIC ======
musicBtn.onclick=()=>{
  const i=document.createElement('input');
  i.type='file';
  i.accept='.mp3,.wav';
  i.onchange=e=>{
    bgMusic.src=URL.createObjectURL(e.target.files[0]);
    bgMusic.play();
  };
  i.click();
};

// ====== GAME ======
function startGame(){
  bird={x:120,y:250,vy:0,radius:15};
  pipes=[];
  frame=0;
  score=0;
  gameOver=false;
  scoreDisplay.innerText=score;
  gameOverScreen.style.display='none';
  if(loop) clearInterval(loop);
  loop=setInterval(update,20);
}

function spawnPipe(){
  const gap=150;
  const topHeight=Math.random()*(canvas.height-gap-50)+20;
  pipes.push({x:canvas.width,top:topHeight,bottom:canvas.height-topHeight-gap,width:50,passed:false});
}

function update(){
  frame++;
  bird.vy+=0.5;
  bird.y+=bird.vy;

  if(frame%90===0) spawnPipe();

  ctx.clearRect(0,0,canvas.width,canvas.height);

  // Draw bird as circle
  ctx.fillStyle='orange';
  ctx.beginPath();
  ctx.arc(bird.x,bird.y,bird.radius,0,Math.PI*2);
  ctx.fill();

  // Draw pipes
  ctx.fillStyle='green';
  for(let i=pipes.length-1;i>=0;i--){
    pipes[i].x-=2;
    ctx.fillRect(pipes[i].x,0,pipes[i].width,pipes[i].top);
    ctx.fillRect(pipes[i].x,canvas.height-pipes[i].bottom,pipes[i].width,pipes[i].bottom);

    // Collision
    if(bird.x+bird.radius>pipes[i].x && bird.x-bird.radius< pipes[i].x+pipes[i].width && (bird.y-bird.radius< pipes[i].top || bird.y+bird.radius>canvas.height-pipes[i].bottom)) endGame();

    // Score
    if(!pipes[i].passed && pipes[i].x+pipes[i].width<bird.x){
      pipes[i].passed=true;
      score++;
    }

    if(pipes[i].x+pipes[i].width<0) pipes.splice(i,1);
  }

  // Floor & ceiling
  if(bird.y+bird.radius>canvas.height || bird.y-bird.radius<0) endGame();

  // Draw score inside canvas
  ctx.fillStyle='white';
  ctx.font='28px "ADLaM Display"';
  ctx.fillText('Score: '+score,10,35);
}

function endGame(){
  gameOver=true;
  clearInterval(loop);
  if(score>highScore){
    highScore=score;
    localStorage.setItem('flappyHighScore',highScore);
  }
  finalScore.innerText='Puntuación: '+score;
  gameOverScreen.style.display='flex';
}

restartBtn.onclick=startGame;

startGame();
</script>
</body>
</html>
