<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sky Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=ADLaM+Display&display=swap" rel="stylesheet">
<style>
body{margin:0;text-align:center;font-family:'ADLaM Display',cursive;background:linear-gradient(to bottom,#87ceeb,#f4f4f4)}
canvas{display:block;margin:30px auto;border:3px solid #333;border-radius:6px;background:#87ceeb;position:relative}
button{padding:10px 20px;font-size:18px;border:none;border-radius:6px;background:#ffd93d;cursor:pointer;font-family:'ADLaM Display'}
button:hover{transform:scale(1.05)}
#musicBtn{position:fixed;bottom:10px;right:10px;font-size:14px}
#score{position:absolute;top:10px;left:10px;font-size:28px;color:#fff;font-weight:bold;text-shadow:2px 2px #000;z-index:10}
#gameOverScreen{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;font-size:32px;font-weight:bold;display:none;z-index:20}
#gameOverScreen button{margin-top:20px}
</style>
</head>
<body>
<h1>Sky Platform</h1>
<div style="position:relative; display:inline-block;">
<canvas id="game" width="700" height="500"></canvas>
<div id="score">0</div>
<div id="gameOverScreen">
  <div id="finalScore"></div>
  <button id="restartBtn">Reiniciar</button>
</div>
</div>
<button id="musicBtn">Musica</button>
<audio id="bgMusic" loop></audio>
<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const musicBtn=document.getElementById('musicBtn');
const bgMusic=document.getElementById('bgMusic');
const scoreDisplay=document.getElementById('score');
const gameOverScreen=document.getElementById('gameOverScreen');
const finalScore=document.getElementById('finalScore');
const restartBtn=document.getElementById('restartBtn');

let player={x:350,y:400,radius:15,vy:0,canJump:true};
let platforms=[];
let enemies=[];
let keys={};
let score=0;
let loop=null;
let speed=4;

const COLOR_ACTIVE='#66ff66';
const COLOR_INACTIVE='#ff6666';

document.addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=true;if(e.key.toLowerCase()==='w') jump();});
document.addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false;});

musicBtn.onclick=()=>{
  const i=document.createElement('input');
  i.type='file';
  i.accept='.mp3,.wav';
  i.onchange=e=>{
    bgMusic.src=URL.createObjectURL(e.target.files[0]);
    bgMusic.play();
  };
  i.click();
};

function startGame(){
  player={x:350,y:400,radius:15,vy:0,canJump:true};
  platforms=[{x:0,y:450,width:700,height:20,color:COLOR_ACTIVE,scored:false}];
  enemies=[];
  score=0;
  speed=4;
  scoreDisplay.innerText=score;
  gameOverScreen.style.display='none';
  if(loop) clearInterval(loop);
  loop=setInterval(update,20);
}

function jump(){
  if(player.canJump){player.vy=-12;player.canJump=false;}
}

function generatePlatform(){
  const width=Math.random()*200+100;
  const x=Math.random()*(canvas.width-width);
  platforms.push({x:x,y:platforms[platforms.length-1].y-100,width:width,height:20,color:COLOR_ACTIVE,scored:false});
  if(Math.random()<0.9){
    enemies.push({x:x+Math.random()*(width-30),y:platforms[platforms.length-1].y-30,width:30,height:30,dir:1});
  }
}

function update(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // ajusta velocidad gradual
  if(keys['a'] || keys['d']){
    if(speed<6) speed+=0.05;
  } else {
    if(speed>4) speed-=0.05;
  }

  if(keys['a']) player.x-=speed;
  if(keys['d']) player.x+=speed;

  player.vy+=0.5;
  player.y+=player.vy;

  player.canJump=false;
  platforms.forEach(p=>{
    ctx.fillStyle=p.color;
    ctx.fillRect(p.x,p.y,p.width,p.height);
    if(player.x+player.radius*2>p.x && player.x< p.x+p.width && player.y+player.radius*2>p.y && player.y+player.radius*2< p.y+player.vy+player.radius*2){
      player.y=p.y-player.radius*2;
      player.vy=0;
      player.canJump=true;
      if(!p.scored){
        score++;
        p.scored=true;
        p.color=COLOR_INACTIVE;
      }
    }
  });

  enemies.forEach(e=>{
    ctx.fillStyle='red';
    ctx.fillRect(e.x,e.y,e.width,e.height);
    e.x+=e.dir*2;
    if(e.x<0 || e.x+e.width>canvas.width) e.dir*=-1;
    if(player.x<e.x+e.width && player.x+player.radius*2>e.x && player.y<e.y+e.height && player.y+player.radius*2>e.y){
      gameOver();
    }
  });

  if(player.y<200){
    const diff=200-player.y;
    player.y=200;
    platforms.forEach(p=>p.y+=diff);
    enemies.forEach(e=>e.y+=diff);
  }

  if(platforms[platforms.length-1].y>0) generatePlatform();

  ctx.fillStyle='blue';
  ctx.beginPath();
  ctx.arc(player.x+player.radius,player.y+player.radius,player.radius,0,Math.PI*2);
  ctx.fill();

  ctx.fillStyle='white';
  ctx.font='28px "ADLaM Display"';
  ctx.fillText('Score: '+score,10,35);

  if(player.y>canvas.height) gameOver();
}

function gameOver(){
  clearInterval(loop);
  finalScore.innerText='Score: '+score;
  gameOverScreen.style.display='flex';
}

restartBtn.onclick=startGame;
startGame();
</script>
</body>
</html>
