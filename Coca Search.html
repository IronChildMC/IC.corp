  <style>
    :root {
      --bg: #f4f4f4;
      --chat-bg: #ffffff;
      --user: #007bff;
      --bot: #e9e9e9;
      --text: #000;
    }

    body.dark {
      --bg: #1e1e1e;
      --chat-bg: #2a2a2a;
      --user: #2563eb;
      --bot: #3a3a3a;
      --text: #ffffff;
    }

    body {
      margin: 0;
      background: var(--bg);
      font-family: Arial, sans-serif;
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    #controls {
      padding: 10px;
      background: var(--chat-bg);
      display: flex;
      gap: 10px;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      background: var(--chat-bg);
    }

    .msg {
      max-width: 70%;
      padding: 10px 14px;
      border-radius: 18px;
      margin: 8px 0;
      animation: fadeIn 0.3s ease;
      white-space: pre-wrap;
    }

    .user {
      align-self: flex-start;
      background: var(--user);
      color: white;
    }

    .bot {
      align-self: flex-end;
      background: var(--bot);
      cursor: pointer;
    }

    .links {
      display: none;
      font-size: 14px;
      margin: 0 0 10px 0;
      align-self: flex-end;
      padding-left: 10px;
      border-left: 3px solid #4da6ff;
    }

    .links strong {
      display: block;
      margin-bottom: 5px;
    }

    .links a {
      display: block;
      color: #4da6ff;
      text-decoration: none;
      margin: 2px 0;
    }

    #inputArea {
      display: flex;
      padding: 10px;
      background: var(--chat-bg);
    }

    #pregunta {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button, select {
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #ccc;
      cursor: pointer;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>

By Coca 😎
</by>

</head>

<body>

<div id="controls">
  <select id="motor">
    <option value="duck">DuckDuckGo</option>
    <option value="wiki">Wikipedia</option>
  </select>

  <button onclick="toggleDark()">Modo Oscuro</button>
</div>

<div id="chat"></div>

<powered>
    Powered by DuckDuckGo/Wikipedia
</powered>

<div id="inputArea">
  <input type="text" id="pregunta" placeholder="Escribe tu pregunta">
  <button onclick="enviar()">Enviar</button>
</div>

<script>
const chat = document.getElementById("chat");

const stopwords = ["que","qué","como","cómo","cual","cuál","donde","dónde","por","para","el","la","los","las","un","una","es","son","de"];

function limpiar(texto){
  return texto
    .toLowerCase()
    .replace(/[¿?.,!¡;]/g,'')
    .split(/\s+/)
    .filter(w => !stopwords.includes(w))
    .join(' ');
}

function agregarMensaje(texto, tipo, links=[], motor=""){
  const div = document.createElement("div");
  div.className = "msg " + tipo;
  div.textContent = texto;
  chat.appendChild(div);

  if(links.length){
    const linkDiv = document.createElement("div");
    linkDiv.className = "links";

    const fuente = document.createElement("strong");
    fuente.textContent = "Fuente: " + (motor === "wiki" ? "Wikipedia" : "DuckDuckGo");
    linkDiv.appendChild(fuente);

    links.forEach(l=>{
      const a = document.createElement("a");
      a.href = l;
      a.target = "_blank";
      a.textContent = l;
      linkDiv.appendChild(a);
    });

    chat.appendChild(linkDiv);

    div.addEventListener("click", ()=>{
      linkDiv.style.display =
        linkDiv.style.display === "none" ? "block" : "none";
    });
  }

  chat.scrollTop = chat.scrollHeight;
}

async function buscarWikipedia(query){
  try{
    let res = await fetch(`https://es.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(query)}`);
    let data = await res.json();

    if(data.extract){
      return {texto: data.extract, links:[data.content_urls.desktop.page]};
    }

    res = await fetch(`https://es.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(query)}&format=json&origin=*`);
    data = await res.json();

    if(data.query.search.length){
      const titulo = data.query.search[0].title;
      const resumen = await fetch(`https://es.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(titulo)}`);
      const resumenData = await resumen.json();
      return {texto: resumenData.extract, links:[resumenData.content_urls.desktop.page]};
    }

    return null;
  }catch{
    return null;
  }
}

async function buscarDuck(query){
  try{
    const res = await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_redirect=1`);
    const data = await res.json();

    let texto="";
    let links=[];

    if(data.AbstractText){
      texto=data.AbstractText;
      if(data.AbstractURL) links.push(data.AbstractURL);
    }else if(data.RelatedTopics){
      data.RelatedTopics.slice(0,5).forEach(t=>{
        if(t.Text) texto+=t.Text+"\n";
        if(t.FirstURL) links.push(t.FirstURL);
      });
    }

    return texto?{texto,links}:null;
  }catch{
    return null;
  }
}

async function enviar(){
  const input=document.getElementById("pregunta");
  const textoOriginal=input.value.trim();
  if(!textoOriginal) return;

  agregarMensaje(textoOriginal,"user");
  input.value="";

  const query=limpiar(textoOriginal);
  const motor=document.getElementById("motor").value;

  let resultado=null;

  if(motor==="wiki"){
    resultado=await buscarWikipedia(query);
  }else{
    resultado=await buscarDuck(query);
  }

  if(resultado){
    agregarMensaje(resultado.texto,"bot",resultado.links,motor);
  }else{
    agregarMensaje("No encontré información.","bot");
  }
}

function toggleDark(){
  document.body.classList.toggle("dark");
}

document.getElementById("pregunta")
  .addEventListener("keypress",e=>{
    if(e.key==="Enter") enviar();
  });
</script>

</body>
</html>
