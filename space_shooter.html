<!-- space_shooter.html -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Space Shooter</title>
<style>
  canvas { background: #000; display: block; margin: 0 auto; }
  body { color: white; font-family: Arial, sans-serif; text-align: center; }
</style>
</head>
<body>
<h1>Space Shooter</h1>
<canvas id="gameCanvas" width="600" height="400"></canvas>
<script>
// Canvas
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// Sonidos
const shootSound = new Audio('https://www.soundjay.com/button/sounds/button-16.mp3');
const explosionSound = new Audio('https://www.soundjay.com/explosion/sounds/explosion-01.mp3');
const powerupSound = new Audio('https://www.soundjay.com/button/sounds/button-09.mp3');

// Jugador
const player = {
    x: canvas.width/2 - 15,
    y: canvas.height - 50,
    width: 30,
    height: 30,
    speed: 5,
    color: 'lime',
    lives: 3,
    canShoot: true,
    shootCooldown: 0,
    doubleShot: false
};

// Balas
const bullets = [];
const bulletSpeed = 7;

// Enemigos
const enemies = [];
let enemySpawnTimer = 0;
let enemySpawnRate = 60; // base

const enemyTypes = [
    { color:'red', speed:2, pattern:'straight' },
    { color:'orange', speed:1.5, pattern:'zigzag' }
];

// Power-ups
const powerUps = [];
const powerUpTypes = [
    { type:'life', color:'pink' },
    { type:'double', color:'cyan' }
];

// Explosiones
const explosions = [];

// Fondo animado (estrellas)
const stars = [];
for(let i=0;i<100;i++){
    stars.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, size:Math.random()*2+1, speed:Math.random()*1+0.5});
}

// Teclas
const keys = {};
document.addEventListener('keydown', e=>keys[e.code]=true);
document.addEventListener('keyup', e=>keys[e.code]=false);

// Disparo
function shoot(){
    if(!player.canShoot) return;
    shootSound.currentTime=0; shootSound.play();
    bullets.push({x:player.x+player.width/2-5, y:player.y, width:10, height:20, color:'yellow'});
    if(player.doubleShot){
        bullets.push({x:player.x+player.width/2-5+15, y:player.y, width:10, height:20, color:'yellow'});
        bullets.push({x:player.x+player.width/2-5-15, y:player.y, width:10, height:20, color:'yellow'});
    }
    player.canShoot=false;
    player.shootCooldown=15;
}

// Crear enemigo
function spawnEnemy(){
    const type = enemyTypes[Math.floor(Math.random()*enemyTypes.length)];
    enemies.push({
        x:Math.random()*(canvas.width-30),
        y:-30,
        width:30,
        height:30,
        color:type.color,
        speed:type.speed,
        pattern:type.pattern,
        dx:Math.random()<0.5?1:-1
    });
}

// Crear power-up
function spawnPowerUp(){
    const type = powerUpTypes[Math.floor(Math.random()*powerUpTypes.length)];
    powerUps.push({
        x:Math.random()*(canvas.width-20),
        y:-20,
        width:20,
        height:20,
        color:type.color,
        type:type.type,
        speed:2
    });
}

// Colisión
function isColliding(a,b){
    return a.x < b.x + b.width &&
           a.x + a.width > b.x &&
           a.y < b.y + b.height &&
           a.y + a.height > b.y;
}

// Puntuación y niveles
let score=0;
let level=1;

// Actualizar
function update(){
    // Fondo estrellas
    stars.forEach(s=>{
        s.y += s.speed;
        if(s.y>canvas.height){ s.y=0; s.x=Math.random()*canvas.width;}
    });

    // Movimiento jugador
    if(keys['ArrowLeft'] && player.x>0) player.x-=player.speed;
    if(keys['ArrowRight'] && player.x+player.width<canvas.width) player.x+=player.speed;
    if(keys['Space']) shoot();

    if(!player.canShoot){player.shootCooldown--; if(player.shootCooldown<=0) player.canShoot=true;}

    // Balas
    bullets.forEach((b,i)=>{
        b.y -= bulletSpeed;
        if(b.y+b.height<0) bullets.splice(i,1);
    });

    // Spawn enemigos y power-ups
    enemySpawnTimer++;
    if(enemySpawnTimer > enemySpawnRate){
        spawnEnemy();
        if(Math.random()<0.1) spawnPowerUp();
        enemySpawnTimer=0;
    }

    // Actualizar enemigos
    enemies.forEach((e,i)=>{
        if(e.pattern==='straight') e.y+=e.speed;
        if(e.pattern==='zigzag'){
            e.y+=e.speed;
            e.x+=e.dx*e.speed;
            if(e.x<0||e.x+e.width>canvas.width) e.dx*=-1;
        }

        // Colisión con balas
        bullets.forEach((b,j)=>{
            if(isColliding(b,e)){
                bullets.splice(j,1);
                enemies.splice(i,1);
                explosionSound.currentTime=0; explosionSound.play();
                explosions.push({x:e.x, y:e.y, size:30, timer:10});
                score+=10;
                if(score%50===0){level++; enemySpawnRate=Math.max(20, enemySpawnRate-5);}
            }
        });

        // Colisión con jugador
        if(isColliding(player,e)){
            enemies.splice(i,1);
            player.lives--;
            if(player.lives<=0) gameOver();
        }

        if(e.y>canvas.height) enemies.splice(i,1);
    });

    // Power-ups
    powerUps.forEach((p,i)=>{
        p.y += p.speed;
        if(isColliding(player,p)){
            if(p.type==='life') player.lives++;
            if(p.type==='double'){player.doubleShot=true; setTimeout(()=>player.doubleShot=false,5000);}
            powerupSound.currentTime=0; powerupSound.play();
            powerUps.splice(i,1);
        }
        if(p.y>canvas.height) powerUps.splice(i,1);
    });

    // Explosiones
    explosions.forEach((ex,i)=>{
        ex.timer--;
        if(ex.timer<=0) explosions.splice(i,1);
    });
}

// Dibujar
function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // Fondo estrellas
    ctx.fillStyle='white';
    stars.forEach(s=> ctx.fillRect(s.x,s.y,s.size,s.size));

    // Jugador
    ctx.fillStyle=player.color;
    ctx.fillRect(player.x,player.y,player.width,player.height);

    // Balas
    bullets.forEach(b=>{
        ctx.fillStyle=b.color;
        ctx.fillRect(b.x,b.y,b.width,b.height);
    });

    // Enemigos
    enemies.forEach(e=>{
        ctx.fillStyle=e.color;
        ctx.fillRect(e.x,e.y,e.width,e.height);
    });

    // Power-ups
    powerUps.forEach(p=>{
        ctx.fillStyle=p.color;
        ctx.fillRect(p.x,p.y,p.width,p.height);
    });

    // Explosiones
    explosions.forEach(ex=>{
        ctx.fillStyle='orange';
        ctx.beginPath();
        ctx.arc(ex.x+ex.size/2, ex.y+ex.size/2, ex.size/2, 0, Math.PI*2);
        ctx.fill();
    });

    // UI
    ctx.fillStyle='white';
    ctx.font='18px Arial';
    ctx.fillText('Score: '+score,10,20);
    ctx.fillText('Lives: '+player.lives,500,20);
    ctx.fillText('Level: '+level,250,20);
}

// Game Over
function gameOver(){
    alert('Game Over! Tu puntuación: '+score);
    document.location.reload();
}

// Loop
function gameLoop(){ update(); draw(); requestAnimationFrame(gameLoop);}
gameLoop();
</script>
</body>
</html>
