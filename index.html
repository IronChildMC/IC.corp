<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>IC.corp</title>
<link rel="icon" href="Logo IC.corp.png">
<style>
body {margin:0; font-family:"Segoe UI",Arial,sans-serif; background:#fff; color:#0f172a;}
header{position:sticky; top:0; background:#fff; border-bottom:2px solid #f97316; z-index:1000;}
.nav-container{max-width:1100px;margin:auto;display:flex;align-items:center;justify-content:space-between;padding:10px 20px;}
nav a{color:#0f172a;text-decoration:none;font-weight:500;padding:5px 10px;border:2px solid transparent;border-radius:5px;transition:all 0.3s;}
nav a:hover{border:2px solid #f97316;}
.container{max-width:1100px;margin:auto;padding:40px 20px;}
h2{color:#0f172a;margin-bottom:10px;}
hr{border:none;height:1px;background:#f97316;margin:10px 0 20px;}
.card{background:#fff;padding:15px;border:1px solid #f97316;border-radius:8px;margin-bottom:15px;opacity:0; transform:translateY(20px); transition:all 0.6s ease;}
.card.visible{opacity:1; transform:translateY(0);}
.btn-link{display:inline-block;margin-top:8px;padding:8px 15px;background:#f97316;color:#fff;border:none;border-radius:5px;text-decoration:none;font-weight:bold;transition:all 0.3s;}
.btn-link:hover{background:#ea580c;}
footer{text-align:center;padding:25px;margin-top:60px;border-top:2px solid #f97316;color:#0f172a;}
</style>
</head>
<body>

<header>
  <div class="nav-container">
    <div>IC.corp</div>
    <nav>
      <a href="index.html">Inicio</a>
      <a href="sobre.html">Sobre</a>
      <a href="trabajos.html">Trabajos actuales</a>
      <a href="creador.html">Sobre el Creador</a>
    </nav>
  </div>
</header>

<div class="container">
<section>
  <h2>Bienvenido a IC.corp</h2>
  <hr>
  <div class="card visible">IC.corp desarrolla soluciones digitales y programas innovadores.</div>
</section>
</div>

<footer>© 2026 IC.corp</footer>

<script>
const cards = document.querySelectorAll(".card");
cards.forEach((c,i)=>setTimeout(()=>c.classList.add("visible"), i*150));
</script>

</body>
</html>
